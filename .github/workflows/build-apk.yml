name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Grant gradlew execute
        run: chmod +x android/gradlew

      - name: Copy web assets
        run: |
          cp public/index.html android/app/src/main/assets/index.html
          cp public/coach_profile.json android/app/src/main/assets/coach_profile.json
          cp -r public/js android/app/src/main/assets/
          cp -r public/css android/app/src/main/assets/
          cp -r public/assets android/app/src/main/assets/

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 嗓音训练
          path: android/app/build/outputs/apk/debug/app-debug.apk