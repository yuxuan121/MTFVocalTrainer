<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body>
<h1>JS Test</h1>
<button onclick="testNav()">Click Test</button>
<div id="result" style="margin-top:20px;font-size:20px;"></div>

<script src="/js/storage.js"></script>
<script src="/js/gamification.js"></script>
<script src="/js/charts.js"></script>
<script src="/js/song-trainer.js"></script>
<script src="/js/ai-coach.js"></script>
<script src="/js/conversation-coach.js"></script>
<script src="/js/voice-studio.js"></script>
<script src="/js/app.js"></script>

<script>
function testNav() {
  var r = document.getElementById('result');
  r.innerHTML = 'typeof app=' + typeof app + '<br>';
  if (typeof app === 'undefined') { r.innerHTML += 'app UNDEFINED'; return; }
  r.innerHTML += 'app.navigateTo=' + typeof app.navigateTo + '<br>';
  r.innerHTML += 'app.renderSection5=' + typeof app.renderSection5 + '<br>';
  r.innerHTML += 'app.renderSection6=' + typeof app.renderSection6 + '<br>';
  r.innerHTML += 'app.renderSection7=' + typeof app.renderSection7 + '<br>';
  if (app.navigateTo) {
    app.navigateTo('section5');
    r.innerHTML += '<b style=color:green>navigateTo called!</b>';
  }
}
</script>
</body>
</html>
